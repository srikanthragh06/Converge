# Traefik static configuration.
# Dynamic config (routers, services, middlewares) is defined via Docker labels
# on each server container in docker-compose.prod.yml.

entryPoints:
    web:
        address: ":80"
        # Redirect all HTTP traffic to HTTPS.
        http:
            redirections:
                entryPoint:
                    to: websecure
                    scheme: https
    websecure:
        address: ":443"

providers:
    docker:
        # Only expose containers that explicitly opt in via traefik.enable=true label.
        exposedByDefault: false

certificatesResolvers:
    letsencrypt:
        acme:
            # email is passed via CLI arg in docker-compose.prod.yml (traefik.yml does not support env var substitution).
            # acme.json is stored in the traefik-certs volume.
            storage: /certs/acme.json
            tlsChallenge: {}
