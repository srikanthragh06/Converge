# Host nginx config for Converge.
# Place at /etc/nginx/sites-available/converge.conf on the VPS.
# Activate with: ln -s /etc/nginx/sites-available/converge.conf /etc/nginx/sites-enabled/converge.conf
# Then run: nginx -t && nginx -s reload
# TLS: run `certbot --nginx -d api.converge.1k5.in` after activating.


# An upstream block defines a named pool of backend servers.
# nginx will distribute incoming requests across them.
# ip_hash means the same client IP always goes to the same server — required
# for Socket.io since the WebSocket connection must stay on one instance.
upstream converge_servers {
    ip_hash;
    server localhost:5001;  # server-1 container
    server localhost:5002;  # server-2 container
    server localhost:5003;  # server-3 container
}


# --- API: api.converge.1k5.in ---
# This server block handles all traffic to the API domain.
# It proxies requests to the upstream pool defined above.
server {
    # Listen on port 80 for both IPv4 and IPv6.
    listen 80;
    listen [::]:80;
    server_name api.converge.1k5.in;

    # Increase buffer sizes for large Yjs update payloads.
    proxy_buffer_size       256k;
    proxy_buffers           4 256k;
    proxy_busy_buffers_size 960k;

    # location / matches all incoming request paths.
    location / {
        # Forward requests to the upstream server pool.
        proxy_pass http://converge_servers;

        # Pass the original client info to the server so logs and
        # rate limiting see the real IP rather than 127.0.0.1.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # These three lines enable WebSocket support.
        # Without them nginx strips the Upgrade header and Socket.io breaks.
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Extend timeouts so long-lived WebSocket connections are not dropped.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
