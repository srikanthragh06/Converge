# Host nginx config for Converge.
# Place at /etc/nginx/sites-available/converge.conf on the VPS.
# Activate with: ln -s /etc/nginx/sites-available/converge.conf /etc/nginx/sites-enabled/converge.conf
# Then run: nginx -t && nginx -s reload
# TLS: run `certbot --nginx -d api.converge.1k5.in -d converge.1k5.in` after activating.
# Certbot will add the ssl_certificate lines and HTTP→HTTPS redirect blocks automatically.
#
# Blue-green deployment:
# The active upstream is selected by /etc/nginx/converge_slot.conf, which
# is written by deploy/deploy.py on each deploy. The file contains a single
# directive: `proxy_pass http://converge_blue;` or `proxy_pass http://converge_green;`
# deploy/deploy.py creates this file automatically on the first deploy if it
# does not exist — no manual setup required.


# Blue slot — docker-compose.blue.yml runs these on host ports 5001–5003.
# ip_hash ensures the same client IP always hits the same instance,
# which is required for Socket.io WebSocket connections to stay on one process.
upstream converge_blue {
    ip_hash;
    server localhost:5001;
    server localhost:5002;
    server localhost:5003;
}

# Green slot — docker-compose.green.yml runs these on host ports 5004–5006.
upstream converge_green {
    ip_hash;
    server localhost:5004;
    server localhost:5005;
    server localhost:5006;
}


# --- API: api.converge.1k5.in (HTTPS) ---
# Handles all REST and WebSocket traffic on port 443.
# The listen and ssl_certificate lines below were added by Certbot.
server {
    server_name api.converge.1k5.in;

    # Increase proxy buffer sizes for large Yjs update payloads.
    # Keeps response data in memory rather than spilling to disk.
    proxy_buffer_size       256k;
    proxy_buffers           4 256k;
    proxy_busy_buffers_size 512k;

    # location / matches all incoming request paths.
    location / {
        # Active upstream is selected by the slot config written by deploy/deploy.py.
        include /etc/nginx/converge_slot.conf;

        # Pass the real client IP to the server so logs and rate limiting
        # see the actual requester rather than 127.0.0.1.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Required for WebSocket (Socket.io) support.
        # Without these, nginx strips the Upgrade header and the WebSocket
        # handshake fails, forcing Socket.io to fall back to long-polling.
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Extend timeouts to keep long-lived WebSocket connections open.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Added by Certbot — enables HTTPS on port 443 with HTTP/2.
    listen [::]:443 ssl ipv6only=on http2;
    listen 443 ssl http2;
    ssl_certificate /etc/letsencrypt/live/api.converge.1k5.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.converge.1k5.in/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}


# --- HTTP → HTTPS redirect (API) ---
# Added by Certbot. Catches all HTTP (port 80) requests and permanently
# redirects them to HTTPS so unencrypted traffic is never served.
server {
    if ($host = api.converge.1k5.in) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    listen [::]:80;
    server_name api.converge.1k5.in;
    return 404;
}


# --- Web: converge.1k5.in (HTTPS) ---
# Serves the React static build directly from disk.
# The listen and ssl_certificate lines below were added by Certbot.
server {
    server_name converge.1k5.in;

    # Directory where the Vite build output (dist/) is copied on the VPS.
    root /var/www/converge;
    index index.html;

    location / {
        # try_files serves the exact file if it exists, then the directory,
        # then falls back to index.html — required for React Router so that
        # refreshing on a nested route doesn't return a 404.
        try_files $uri $uri/ /index.html;
    }

    # Added by Certbot — enables HTTPS on port 443 with HTTP/2.
    listen [::]:443 ssl http2;
    listen 443 ssl http2;
    ssl_certificate /etc/letsencrypt/live/converge.1k5.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/converge.1k5.in/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}


# --- HTTP → HTTPS redirect (Web) ---
# Added by Certbot. Catches all HTTP (port 80) requests and permanently
# redirects them to HTTPS so unencrypted traffic is never served.
server {
    if ($host = converge.1k5.in) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    listen [::]:80;
    server_name converge.1k5.in;
    return 404;
}
